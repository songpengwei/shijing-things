version: '3.8'

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shijing-app
    ports:
      - "8000:8000"
    volumes:
      - ./backend/static:/app/static
      - ./backend/shijing.db:/app/shijing.db
    environment:
      - DATABASE_URL=sqlite:///./shijing.db
      - STATIC_DIR=./static
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
