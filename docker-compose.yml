version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shijing-app
    ports:
      - "8000:8000"
    volumes:
      - ./shijing_things/static:/app/shijing_things/static
      - ./shijing.db:/app/shijing.db
    environment:
      - DATABASE_URL=sqlite:////app/shijing.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
