{% extends "base.html" %}

{% block title %}登录 - 诗经事物{% endblock %}

{% block content %}
<div class="container">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <span class="login-icon">🔐</span>
                <h1>管理员登录</h1>
                <p>请输入用户名和密码访问管理页面</p>
            </div>

            {% if error %}
            <div class="login-error">
                <span>⚠️</span> {{ error }}
            </div>
            {% endif %}

            <form method="post" action="/login" class="login-form">
                <input type="hidden" name="next" value="{{ next }}">
                
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        required 
                        autocomplete="username"
                        placeholder="请输入用户名"
                        autofocus
                    >
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required 
                        autocomplete="current-password"
                        placeholder="请输入密码"
                    >
                </div>

                <button type="submit" class="btn btn-primary btn-lg btn-block">
                    登录
                </button>
            </form>

            <div class="login-footer">
                <a href="/" class="back-link">← 返回首页</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
.login-container {
    min-height: 70vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 0;
}

.login-card {
    background: var(--color-card);
    border-radius: var(--radius);
    padding: 2.5rem;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--shadow-lg);
}

.login-header {
    text-align: center;
    margin-bottom: 2rem;
}

.login-icon {
    font-size: 3rem;
    display: block;
    margin-bottom: 1rem;
}

.login-header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--color-text);
    margin-bottom: 0.5rem;
}

.login-header p {
    color: var(--color-text-light);
    font-size: 0.875rem;
}

.login-error {
    background: #fee2e2;
    color: #dc2626;
    padding: 0.875rem 1rem;
    border-radius: var(--radius-sm);
    margin-bottom: 1.5rem;
    font-size: 0.875rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.login-form .form-group {
    margin-bottom: 1.25rem;
}

.login-form label {
    display: block;
    margin-bottom: 0.5rem;
    font-weight: 500;
    color: var(--color-text);
    font-size: 0.875rem;
}

.login-form input {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-sm);
    font-size: 1rem;
    transition: border-color 0.2s, box-shadow 0.2s;
}

.login-form input:focus {
    outline: none;
    border-color: var(--color-primary);
    box-shadow: 0 0 0 3px rgba(217, 119, 6, 0.1);
}

.btn-block {
    width: 100%;
}

.login-footer {
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--color-border);
    text-align: center;
}

@media (max-width: 640px) {
    .login-card {
        padding: 1.5rem;
        margin: 1rem;
    }
}
</style>
{% endblock %}
